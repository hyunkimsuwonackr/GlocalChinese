<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glocal Chinese x AI Portfolio Example</title>
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans KR', 'Poppins', sans-serif; 
            background-color: #f9fafb; 
            overflow-x: hidden;
        }
        
        /* 입장 애니메이션 설정 */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 버튼 강조 애니메이션 */
        @keyframes pulse-blue {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .cta-pulse { animation: pulse-blue 2s infinite; background-color: #3b82f6 !important; }
        
        .notion-card { transition: all 0.3s ease; }
        .notion-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <!-- 메인 컨테이너 -->
    <div id="main-content" class="fade-in-up max-w-5xl mx-auto bg-white border border-gray-200 rounded-2xl shadow-2xl overflow-hidden">
        
        <!-- Notion-Style Header -->
        <div class="h-48 bg-slate-200 relative">
            <img src="https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
            <div class="absolute -bottom-10 left-12">
                <div class="bg-white p-4 rounded-3xl shadow-xl border border-gray-100 text-6xl">🚀</div>
            </div>
        </div>

        <div class="pt-16 px-12 pb-8">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2 underline decoration-blue-500 underline-offset-8 tracking-tight">My Glocal Chinese Portfolio</h1>
            <p class="text-slate-500 font-medium tracking-wide">Mentor: 高建惠 교수님 & Henry</p>
        </div>

        <!-- Dashboard Layout -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 px-12 pb-12">
            
            <!-- Left Sidebar -->
            <div class="md:col-span-4 space-y-6">
                <div class="p-6 bg-blue-600 rounded-2xl text-white shadow-lg">
                    <p class="text-xs opacity-80 mb-1 uppercase font-black">Henry's Message</p>
                    <p class="text-lg font-bold italic leading-tight">"AI와 중국어의 결합,<br>너희의 미래를 디자인해!"</p>
                </div>
                <div class="space-y-3 p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-black tracking-widest uppercase text-center">Language Mastery</p>
                    <div class="h-2 w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-1000 w-0"></div>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold">NotebookLM</span>
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold">Vrew</span>
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold">ChatGPT</span>
                </div>
            </div>

            <!-- Main Content: AI Video Area -->
            <div class="md:col-span-8 space-y-6">
                <!-- 동영상 자동 재생 영역 -->
                <div class="relative group rounded-2xl bg-slate-900 overflow-hidden shadow-2xl border-4 border-slate-100">
                    <video autoplay muted loop playsinline class="w-full h-auto object-cover">
                        <source src="视频已准备就绪.mp4" type="video/mp4">
                        브라우저가 동영상을 지원하지 않습니다.
                    </video>
                    
                    <div class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-lg text-white border border-white/20">
                        <p class="text-xs font-bold tracking-tight">📽️ AI Henry의 웰컴 메시지 (VEO 제작)</p>
                    </div>
                </div>

                <!-- Projects Info -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="notion-card p-5 border border-gray-100 rounded-2xl bg-gray-50/50">
                        <h4 class="font-bold text-slate-800 flex items-center gap-2">🏎️ GWM 시뮬레이션</h4>
                        <p class="text-[11px] text-gray-500 mt-2">상담회 현장 롤플레이 대본 완성</p>
                    </div>
                    <div class="notion-card p-5 border border-gray-100 rounded-2xl bg-gray-50/50">
                        <h4 class="font-bold text-slate-800 flex items-center gap-2">🏯 화성 로컬 투어</h4>
                        <p class="text-[11px] text-gray-500 mt-2">Vrew 활용 가이드 영상 제작 중</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / CTA -->
        <div class="bg-gray-50 px-12 py-8 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-gray-400 font-medium italic">"준비됐니? 이제 너의 차례야!"</p>
            <button id="cta-button" class="w-full md:w-auto px-10 py-4 bg-slate-900 text-white font-black rounded-xl transition-all shadow-xl">
                수강신청 하러가기 →
            </button>
        </div>
    </div>

    <!-- 스크립트: 등장 및 자동 실행 트리거 -->
    <script>
        window.onload = () => {
            // 0.8초 뒤에 전체 콘텐츠 스르륵 등장
            setTimeout(() => {
                document.getElementById('main-content').classList.add('is-visible');
                
                // 1.5초 뒤에 프로그레스 바 차오름
                setTimeout(() => {
                    document.getElementById('progress-bar').style.width = '75%';
                }, 500);

                // 2.5초 뒤에 수강신청 버튼 반짝임 시작
                setTimeout(() => {
                    document.getElementById('cta-button').classList.add('cta-pulse');
                }, 1500);
            }, 800);
        };
    </script>
</body>
</html>
